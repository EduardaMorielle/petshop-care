<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <img src="assets/logo.png" alt="PetShop Care" class="logo" />
      <h1>PetShop Care</h1>
      <p>Sistema de Gerenciamento</p>
    </div>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="seu@email.com" />
          @if (form.get('email')?.hasError('email')) {
            <mat-error>Email inválido</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="senha" type="password" />
          @if (form.get('senha')?.hasError('minlength')) {
            <mat-error>Mínimo 6 caracteres</mat-error>
          }
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                class="full-width login-btn" [disabled]="loading">
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Entrar
          }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
