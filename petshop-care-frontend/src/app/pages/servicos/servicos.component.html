<div class="page-header">
  <h2><mat-icon>content_cut</mat-icon> Serviços</h2>
  @if (auth.isAdmin()) {
    <button mat-raised-button color="primary" (click)="abrirFormulario()">
      <mat-icon>add</mat-icon> Novo Serviço
    </button>
  }
</div>

<mat-card>
  <mat-card-content>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar serviço</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput (input)="filtrar($event)" placeholder="Nome..." />
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" matSort class="full-width">
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
        <td mat-cell *matCellDef="let s">{{ s.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let s">{{ s.descricao || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="duracao">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Duração</th>
        <td mat-cell *matCellDef="let s">{{ s.duracaoMinutos }} min</td>
      </ng-container>

      <ng-container matColumnDef="preco">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Preço</th>
        <td mat-cell *matCellDef="let s">{{ s.preco | currency:'BRL' }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let s">
          <span class="badge" [class.ativo]="s.ativo" [class.inativo]="!s.ativo">
            {{ s.ativo ? 'Ativo' : 'Inativo' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let s">
          @if (auth.isAdmin()) {
            <button mat-icon-button color="primary" (click)="abrirFormulario(s)" matTooltip="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button (click)="alterarStatus(s)"
                    [matTooltip]="s.ativo ? 'Desativar' : 'Ativar'"
                    [color]="s.ativo ? 'warn' : 'accent'">
              <mat-icon>{{ s.ativo ? 'toggle_on' : 'toggle_off' }}</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deletar(s)" matTooltip="Remover">
              <mat-icon>delete</mat-icon>
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="6">Nenhum serviço encontrado</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </mat-card-content>
</mat-card>
