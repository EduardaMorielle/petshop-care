<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="logo-area">
      <img src="assets/logo.png" alt="PetShop Care" class="logo" />
      <h2>PetShop Care</h2>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/pets" routerLinkActive="active-link">
        <mat-icon matListItemIcon>pets</mat-icon>
        <span matListItemTitle>Meus Pets</span>
      </a>

      <a mat-list-item routerLink="/agendamentos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>calendar_today</mat-icon>
        <span matListItemTitle>Agendamentos</span>
      </a>

      <a mat-list-item routerLink="/servicos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>content_cut</mat-icon>
        <span matListItemTitle>Serviços</span>
      </a>

      @if (auth.isAtendente()) {
        <a mat-list-item routerLink="/atendimento" routerLinkActive="active-link">
          <mat-icon matListItemIcon>assignment</mat-icon>
          <span matListItemTitle>Atendimento</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <button mat-button (click)="logout()" class="logout-btn">
        <mat-icon>logout</mat-icon> Sair
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <span class="toolbar-spacer"></span>
      <mat-icon>account_circle</mat-icon>
      <span class="user-name">{{ auth.getNome() }}</span>
      <span class="perfil-badge">{{ auth.getPerfil() | titlecase }}</span>
    </mat-toolbar>

    <div class="content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
